<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USF playground</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      body { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
      h1 { margin-bottom: 0.25rem; }
      .tagline { opacity: 0.7; margin-top: 0; }
      .row { display: grid; grid-template-columns: 280px 1fr; gap: 1rem; }
      textarea, pre { width: 100%; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
      textarea { min-height: 120px; padding: 0.5rem; }
      pre { background: #111; color: #eee; padding: 1rem; overflow: auto; border-radius: 6px; max-height: 60vh; }
      select, button { padding: 0.4rem 0.6rem; font-size: 14px; }
      button { cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>USF playground</h1>
    <p class="tagline">Turn prompts into portable, testable, versioned units.</p>
    <div class="row">
      <div>
        <label>Skill</label><br />
        <select id="skill"></select><br /><br />
        <label>Provider</label><br />
        <select id="provider">
          <option>openai</option>
          <option>anthropic</option>
          <option>gemini</option>
          <option>ollama</option>
        </select><br /><br />
        <div id="inputs"></div>
        <button id="render">Render payload</button>
      </div>
      <div>
        <h3>Compiled prompt</h3>
        <pre id="prompt"></pre>
        <h3>Provider payload</h3>
        <pre id="payload"></pre>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
